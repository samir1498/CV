name: cv-ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        uses: xu-cheng/texlive-action@v3
        with:
          os: debian
          run: |
            apt-get update -qq
            apt-get install -y -qq make fonts-freefont-otf fonts-paktype-naskh-basic

      - name: Build public CVs
        run: make public

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs-${{ github.sha }}
          path: |
            output/en/Bettahar-Samir-Resume.pdf
            output/fr/Bettahar-Samir-CV.pdf
            output/ar/Bettahar-Samir-Ar-CV.pdf