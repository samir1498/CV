name: cv-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: apt-get update && apt-get install -y make fonts-freefont-otf fonts-paktype 2>/dev/null || true

      - name: Build French CV
        run: make fr
      - name: Build English CV
        run: make en
      - name: Build Arabic CV
        run: |
          mkdir -p output/ar
          xelatex -interaction=nonstopmode -halt-on-error \
            -jobname=Bettahar-Samir-Ar-CV \
            -output-directory=output/ar \
            '\let\UseMathForPositioningText\relax\input{Bettahar-Samir-Ar-CV.tex}'
          xelatex -interaction=nonstopmode -halt-on-error \
            -jobname=Bettahar-Samir-Ar-CV \
            -output-directory=output/ar \
            '\let\UseMathForPositioningText\relax\input{Bettahar-Samir-Ar-CV.tex}'

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            output/en/Bettahar-Samir-Resume.pdf
            output/fr/Bettahar-Samir-CV.pdf
            output/ar/Bettahar-Samir-Ar-CV.pdf
