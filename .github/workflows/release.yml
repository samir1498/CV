name: cv-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build public CVs
        uses: xu-cheng/texlive-action@v3
        with:
          run: |
            apk add make
            make public

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            output/en/Bettahar-Samir-Resume.pdf
            output/fr/Bettahar-Samir-CV.pdf
            output/ar/Bettahar-Samir-Ar-CV.pdf
